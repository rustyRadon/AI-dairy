name: ai_diary_mobile
description: AI Conversational Diary (Flutter MVP UI)
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  phosphor_flutter: ^2.1.0
  shared_preferences: ^2.3.2
  share_plus: ^10.0.2
  permission_handler: ^11.3.1
  record: ^6.0.0
  device_calendar: ^4.3.3
  path_provider: ^2.1.5
  local_auth: ^2.3.0
  flutter_tts: ^4.2.0
  package_info_plus: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/4.png
    - assets/images/2.png
    - assets/images/ore_mascot.png
    - assets/images/browser-safari-svgrepo-com.svg
    - assets/images/twitter-logo-svgrepo-com.svg
    - assets/images/instagram-2-1-logo-svgrepo-com.svg

